<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #050810;
    --darker: #020407;
    --text: #e8dfc4;
    --accent: #1a2a4a;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--darker);
    overflow: hidden;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: var(--text);
  }

  /* ── CANVAS for the falling numbers ── */
  #matrixCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 1;
  }

  /* ── VIGNETTE overlay ── */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(2,4,7,0.75) 70%,
      rgba(2,4,7,0.97) 100%);
    pointer-events: none;
  }

  /* ── SCANLINES ── */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
  }

  /* ── MAIN STAGE ── */
  .stage {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* ── TOP RULE ── */
  .rule {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-bottom: 2.2rem;
    animation: expandRule 1.8s 0.6s ease forwards;
  }
  @keyframes expandRule { to { width: min(600px, 80vw); } }

  /* ── LOGO / TITLE ── */
  .brand {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.65rem, 1.5vw, 0.9rem);
    letter-spacing: 0.55em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(-14px);
    animation: fadeUp 1s 1.2s ease forwards;
    margin-bottom: 0.6rem;
  }

  .welcome {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(2.2rem, 7vw, 5.8rem);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #f0d080 0%, #c9a84c 40%, #f0d080 70%, #a07830 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1.2s 1.6s ease forwards;
    text-align: center;
    line-height: 1.05;
    filter: drop-shadow(0 0 28px rgba(201,168,76,0.35));
  }

  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.6rem, 1.2vw, 0.78rem);
    letter-spacing: 0.48em;
    color: rgba(201,168,76,0.6);
    text-transform: uppercase;
    margin-top: 0.5rem;
    opacity: 0;
    animation: fadeUp 1s 2.2s ease forwards;
  }

  .rule-bottom {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-top: 2rem;
    margin-bottom: 2.4rem;
    animation: expandRule 1.8s 2s ease forwards;
  }

  /* ── CITATION BLOCK ── */
  .citation-wrap {
    opacity: 0;
    animation: fadeUp 1.2s 2.8s ease forwards;
    text-align: center;
    max-width: min(640px, 88vw);
    padding: 0 1rem;
  }

  .citation-text {
    font-size: clamp(1rem, 2.2vw, 1.35rem);
    font-style: italic;
    font-weight: 300;
    color: var(--text);
    line-height: 1.7;
    letter-spacing: 0.02em;
    opacity: 0;
    transition: opacity 0.7s ease;
  }
  .citation-text.visible { opacity: 1; }

  .citation-author {
    margin-top: 0.9rem;
    font-family: 'Cinzel', serif;
    font-size: clamp(0.55rem, 1vw, 0.72rem);
    letter-spacing: 0.38em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.7s ease 0.2s;
  }
  .citation-author.visible { opacity: 1; }

  /* ── CTA BUTTON ── */
  .cta-wrap {
    margin-top: 2.6rem;
    opacity: 0;
    animation: fadeUp 1s 3.4s ease forwards;
  }

  .cta-btn {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: clamp(0.65rem, 1.2vw, 0.82rem);
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--dark);
    background: linear-gradient(135deg, #f0d080, #c9a84c, #a07830);
    border: none;
    padding: 1rem 2.8rem;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.3s ease;
    text-decoration: none;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .cta-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.18);
    transform: translateX(-100%) skewX(-15deg);
    transition: transform 0.4s ease;
  }
  .cta-btn:hover::before { transform: translateX(120%) skewX(-15deg); }
  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(201,168,76,0.45);
  }
  .cta-btn:active { transform: translateY(0); }

  /* ── CORNER ORNAMENTS ── */
  .corner {
    position: fixed;
    z-index: 11;
    width: 60px;
    height: 60px;
    opacity: 0;
    animation: fadeIn 1s 3s ease forwards;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 1.5rem; left: 1.5rem; }
  .corner.tr { top: 1.5rem; right: 1.5rem; transform: scaleX(-1); }
  .corner.bl { bottom: 1.5rem; left: 1.5rem; transform: scaleY(-1); }
  .corner.br { bottom: 1.5rem; right: 1.5rem; transform: scale(-1,-1); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 0.55; }
  }
</style>

const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');

let cols, drops, fontSize;

function initCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  fontSize = window.innerWidth < 600 ? 13 : 16;
  cols = Math.floor(canvas.width / (fontSize * 3.6));
  drops = Array.from({length: cols}, () => Math.random() * -60);
}

function drawMatrix() {
  // Semi-transparent black trail — lighter = longer glowing tail
  ctx.fillStyle = 'rgba(2,4,7,0.12)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < drops.length; i++) {
    const account = ACCOUNTS[Math.floor(Math.random() * ACCOUNTS.length)];
    const x = i * fontSize * 3.6;
    const y = drops[i] * fontSize;

    // Head character: bright white-gold, rest: vivid gold
    if (Math.random() > 0.92) {
      // Brightest head drop
      ctx.shadowColor = '#ffe066';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#fff5c0';
    } else if (Math.random() > 0.6) {
      ctx.shadowColor = '#c9a84c';
      ctx.shadowBlur = 6;
      ctx.fillStyle = '#f0c843';
    } else {
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#b8922a';
    }

    ctx.font = `bold ${fontSize}px 'Courier New', monospace`;
    ctx.fillText(account, x, y);

    // Reset shadow after each draw
    ctx.shadowBlur = 0;

    if (y > canvas.height && Math.random() > 0.97) {
      drops[i] = 0;
    }
    drops[i] += 0.5;
  }
}

initCanvas();
window.addEventListener('resize', () => { initCanvas(); });
setInterval(drawMatrix, 45);

// Duplicate to reach ~3000
const CITATIONS = [];
while (CITATIONS.length < 3000) {
  for (let i = 0; i < CITATIONS_RAW.length && CITATIONS.length < 3000; i++) {
    CITATIONS.push(CITATIONS_RAW[i]);
  }
}
// Shuffle once
for (let i = CITATIONS.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [CITATIONS[i], CITATIONS[j]] = [CITATIONS[j], CITATIONS[i]];
}

// Pick index seeded by today's date + a random component stored in sessionStorage
function pickCitation() {
  const today = new Date().toDateString();
  let stored = sessionStorage.getItem('comeo_session_id');
  if (!stored) {
    stored = String(Date.now() + Math.floor(Math.random() * 1e9));
    sessionStorage.setItem('comeo_session_id', stored);
  }
  const key = today + stored;
  let hash = 0;
  for (let c of key) hash = (hash * 31 + c.charCodeAt(0)) >>> 0;
  return CITATIONS[hash % CITATIONS.length];
}

function showCitation() {
  const [text, author] = pickCitation();
  const elText = document.getElementById('citText');
  const elAuthor = document.getElementById('citAuthor');
  elText.classList.remove('visible');
  elAuthor.classList.remove('visible');
  elText.textContent = `« ${text} »`;
  elAuthor.textContent = `— ${author}`;
  // Slight delay so fade-in animates after text is set
  setTimeout(() => {
    elText.classList.add('visible');
    elAuthor.classList.add('visible');
  }, 3200);
}

showCitation();
